<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Bella Pizza | Links Úteis</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Damion&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/linkbio.css">
    <link rel="stylesheet" href="css/loader.css">
    <script>
        // Corrige a altura real no mobile de forma suave
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVH();
        window.addEventListener('resize', setVH);
    </script>
</head>

<body>
    <!-- Global Cinematic Loader -->
    <div id="global-loader">
        <div class="loader-content">
            <!-- SVG Simulating Pizza -->
            <svg class="pizza-svg" viewBox="0 0 100 100">
                <defs>
                    <mask id="pizza-mask">
                        <circle class="eat-circle" cx="50" cy="50" r="25" fill="none" stroke="white" stroke-width="50" stroke-dasharray="158" stroke-dashoffset="0" transform="rotate(-90 50 50)" />
                    </mask>
                </defs>
                <g mask="url(#pizza-mask)">
                    <!-- Fatias Triangulares (60 graus cada) -->
                    <path d="M 50 50 L 50 2 A 48 48 0 0 1 91.569 26 Z" fill="#64B95F" />
                    <path d="M 50 50 L 91.569 26 A 48 48 0 0 1 91.569 74 Z" fill="#DE4E45" />
                    <path d="M 50 50 L 91.569 74 A 48 48 0 0 1 50 98 Z" fill="#64B95F" />
                    <path d="M 50 50 L 50 98 A 48 48 0 0 1 8.431 74 Z" fill="#DE4E45" />
                    <path d="M 50 50 L 8.431 74 A 48 48 0 0 1 8.431 26 Z" fill="#64B95F" />
                    <path d="M 50 50 L 8.431 26 A 48 48 0 0 1 50 2 Z" fill="#DE4E45" />
                    
                    <!-- Borda (crosta da pizza) na cor original laranja -->
                    <circle cx="50" cy="50" r="46" fill="none" stroke="#ff9f1c" stroke-width="8" />
                </g>
            </svg>
            <img src="assets/img/logo.webp" alt="La Bella Pizza" class="loader-logo">
        </div>
    </div>

    <!-- Blur de fundo gourmet para visual impecável no Desktop -->
    <div class="desktop-bg-blur"></div>

    <!-- Container principal (enquadrado como celular em telas desktop) -->
    <div class="bio-wrapper">

        <!-- Minhocas SVG de Background Animadas -->
        <div class="bio-bg-worm">
            <!-- 1. Minhocão (Desktop) -->
            <svg class="bio-minhocao" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <!-- Curva ampla, extremamente suave e grossa feita para enquadrar o desktop -->
                <path id="bio-stroke-path-desk" d="M -100,250 C 400,50 800,950 1300,550 C 1700,250 2000,850 2100,950" stroke="#AAD5A7" stroke-width="240" stroke-linecap="round" />
            </svg>
            <!-- 2. Minhoquinha (Mobile) -->
            <svg class="bio-minhoquinha" viewBox="0 0 400 800" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <!-- Curva vertical harmoniosa feita para telas de celulares -->
                <path id="bio-stroke-path-mob" d="M 120,-40 C 20,180 380,100 350,380 C 320,600 50,560 100,850" stroke="#AAD5A7" stroke-width="96" stroke-linecap="round" />
            </svg>
        </div>

        <div class="bio-container">
            <!-- Header com Logo em formato original sem cortes ou bordas circulares -->
            <header class="bio-header">
                <div class="logo-wrapper">
                    <img src="assets/img/logo.webp" alt="La Bella Pizza Logo" class="bio-logo">
                </div>
                <p class="bio-subtitle">A melhor pizza artesanal de Petrópolis 🍕🔥</p>
            </header>

            <!-- Lista de Links com Motions de Clique dedicados -->
            <main class="bio-links">
                <!-- 1. Delivery -->
                <a href="cardápio.html" target="_blank" class="bio-btn btn-delivery" id="link-delivery">
                    <div class="btn-content">
                        <span class="btn-icon" style="display: inline-block; transform: scaleX(-1);">🛵</span>
                        <span class="btn-text">Fazer Pedido (Delivery)</span>
                    </div>
                    <!-- Motion da Motinha com Rastro Falso -->
                    <div class="motion-delivery-wrap">
                        <span class="delivery-moto" style="display: inline-block; transform: scaleX(-1);">🛵</span>
                        <div class="delivery-rastro">
                            <span class="rastro-line line1"></span>
                            <span class="rastro-line line2"></span>
                            <span class="rastro-line line3"></span>
                        </div>
                    </div>
                </a>

                <!-- 2. WhatsApp -->
                <a href="https://wa.me/5524999323962" target="_blank" class="bio-btn btn-whatsapp" id="link-whatsapp">
                    <div class="btn-content">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.965C16.488 1.977 14.021.954 11.998.954c-5.446 0-9.87 4.372-9.874 9.802-.001 1.79.49 3.537 1.424 5.081L2.529 21.57l6.118-1.597z" />
                        </svg>
                        <span class="btn-text">Dúvidas via WhatsApp</span>
                    </div>
                    <!-- Motion do Balão de Diálogo -->
                    <div class="motion-whatsapp-wrap">
                        <div class="whatsapp-dialog">
                            <div class="dialog-dots">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- 3. Instagram -->
                <a href="https://www.instagram.com/labellapizzapetropolis/" target="_blank"
                    class="bio-btn btn-instagram" id="link-instagram">
                    <div class="btn-content">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z" />
                        </svg>
                        <span class="btn-text">Nosso Instagram</span>
                    </div>
                    <!-- Motion da Câmera piscando e Corações subindo -->
                    <div class="motion-instagram-wrap" id="insta-hearts-container">
                        <span class="insta-camera-emoji">📸</span>
                    </div>
                </a>

                <!-- 4. Website -->
                <a href="index.html" target="_blank" class="bio-btn btn-website" id="link-website">
                    <div class="btn-content">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
                        </svg>
                        <span class="btn-text">Visitar Nosso Site</span>
                    </div>
                    <!-- Motion do Logo Rotatório do Website -->
                    <div class="motion-website-wrap">
                        <div class="web-motion-icon">🌐</div>
                    </div>
                </a>
            </main>

            <!-- Rodapé corporativo simplificado -->
            <footer class="bio-footer">
                <span class="footer-sign">La Bella Pizza © 2026 · Feito com Amor 🍕<br><a href="https://canedoweb.vercel.app/" target="_blank" style="text-decoration: underline; color: inherit; font-weight: 600; opacity: 0.8; transition: opacity 0.2s ease;">Desenvolvido por Canedo</a></span>
            </footer>
        </div>
    </div>

    <!-- GSAP Core CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <!-- Script de Animações Customizadas -->
    <script src="js/linkbio.js"></script>
    <script src="js/loader.js"></script>
</body>

</html>
